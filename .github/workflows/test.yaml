name: Tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          # hatch-vcs derives the package version from git history during the
          # editable install, so the full history must be available.
          fetch-depth: 0

      # The editable install runs the custom frontend build hook
      # (bun install + bun vite build) before the package is importable.
      - uses: oven-sh/setup-bun@v2

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run --frozen pytest
